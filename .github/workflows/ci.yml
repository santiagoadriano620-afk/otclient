name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build - Windows
    runs-on: windows-latest
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/reusable-build-windows.yml
    secrets: inherit
