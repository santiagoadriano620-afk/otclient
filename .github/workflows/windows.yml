name: CI

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "src/**"
      - "tests/**"
      - "cmake/**"
      - "android/**"
      - "browser/**"
      - "data/**"
      - "mods/**"
      - "modules/**"
      - "tools/**"
      - "vc18/**"
      - "vcpkg.json"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "Dockerfile"
      - "Dockerfile.browser"
      - "Dockerfile.browser.sh"
      - "build_luajit_android.sh"
      - "setup_android_deps.sh"
      - "init.lua"
      - "otclientrc.lua"
      - "cacert.pem"
      - "config.ini"
      - ".dockerignore"
      - ".yamllint.yaml"
      - ".reviewdog.yml"
      - ".github/workflows/**"
  merge_group:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "cmake/**"
      - "android/**"
      - "browser/**"
      - "data/**"
      - "mods/**"
      - "modules/**"
      - "tools/**"
      - "vc18/**"
      - "vcpkg.json"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "Dockerfile"
      - "Dockerfile.browser"
      - "Dockerfile.browser.sh"
      - "build_luajit_android.sh"
      - "setup_android_deps.sh"
      - "init.lua"
      - "otclientrc.lua"
      - "cacert.pem"
      - "config.ini"
      - ".dockerignore"
      - ".yamllint.yaml"
      - ".reviewdog.yml"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Fast Checks
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    permissions:
      contents: read
      checks: write
      pull-requests: read
    uses: ./.github/workflows/reusable-checks.yml
    secrets: inherit

  tests-lua:
    name: Lua Syntax
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-tests-lua.yml
    secrets: inherit

  build-windows:
    name: Build - Windows
    needs: [checks, tests-lua]
    if: needs.checks.result == 'success' && needs.tests-lua.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/reusable-build-windows.yml
    secrets: inherit
